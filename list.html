<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Soundjournal | Folder Scout</title>
    <style>
        :root { --bg: #000; --panel: #0d0d0d; --text-dim: #666; --text-bright: #eceae4; --accent: #00ffcc; --border: #222; --warn: #ff4444; }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background: var(--bg); color: var(--text-bright); font-family: -apple-system, system-ui, sans-serif; padding: 40px; }
        
        header { border-bottom: 1px solid var(--border); padding-bottom: 20px; margin-bottom: 30px; display: flex; justify-content: space-between; align-items: center; }
        h1 { font-size: 12px; letter-spacing: 3px; color: var(--text-dim); text-transform: uppercase; }
        
        .btn { background: #1a1a1a; border: 1px solid #333; color: #fff; cursor: pointer; font-family: monospace; font-size: 11px; font-weight: bold; padding: 10px 18px; border-radius: 4px; transition: 0.1s; text-transform: uppercase; }
        .btn:hover { border-color: #666; background: #222; }
        .btn-primary { background: var(--text-bright); color: #000; border: none; }
        .btn-accent { color: var(--accent); border-color: #004433; }

        .stats-bar { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 15px; margin-bottom: 30px; }
        .stat-card { background: var(--panel); border: 1px solid var(--border); padding: 15px; border-radius: 4px; }
        .stat-label { font-size: 10px; color: var(--text-dim); text-transform: uppercase; margin-bottom: 5px; }
        .stat-value { font-family: monospace; font-size: 18px; color: var(--accent); }

        .file-group { margin-bottom: 25px; background: var(--panel); border: 1px solid var(--border); border-radius: 4px; }
        .group-header { background: #111; padding: 12px 20px; font-family: monospace; font-size: 11px; color: var(--text-bright); border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; }
        .file-list { padding: 15px 20px; list-style: none; display: grid; grid-template-columns: 1fr 1fr; gap: 5px 20px; }
        .file-item { font-family: monospace; font-size: 12px; color: #999; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .missing-log { color: var(--warn); }
        .missing-log::after { content: " [NO LOG]"; font-size: 9px; vertical-align: middle; opacity: 0.7; }

        #output-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.98); display: none; padding: 50px; flex-direction: column; z-index: 100; }
        #output-area { flex: 1; background: #000; border: 1px solid var(--border); color: #ccc; font-family: 'Courier New', monospace; padding: 30px; outline: none; resize: none; font-size: 14px; line-height: 1.5; }
    </style>
</head>
<body>

<header>
    <h1>SC_SCOUT // AUDITOR V1.2</h1>
    <div style="display:flex; gap:10px;">
        <button class="btn btn-primary" onclick="selectFolder()">SCAN FOLDER</button>
        <button class="btn btn-accent" onclick="prepareExport('md')">PREVIEW MD</button>
        <button class="btn btn-accent" onclick="prepareExport('txt')">PREVIEW TXT</button>
    </div>
</header>

<div id="stats" class="stats-bar"></div>
<div id="file-display"></div>

<div id="output-overlay">
    <div style="display:flex; justify-content: space-between; margin-bottom: 20px;">
        <h2 id="export-title" style="font-size: 11px; font-family: monospace; color: var(--text-dim);">PREVIEW</h2>
        <div style="display:flex; gap: 10px;">
            <button class="btn" onclick="downloadList()" style="color: var(--accent);">DOWNLOAD FILE</button>
            <button class="btn" onclick="copyOutput()">COPY CLIPBOARD</button>
            <button class="btn" onclick="document.getElementById('output-overlay').style.display='none'">CLOSE</button>
        </div>
    </div>
    <textarea id="output-area" spellcheck="false"></textarea>
</div>

<script>
    let inventory = [];
    let currentExportType = "md";

    async function selectFolder() {
        try {
            const dirHandle = await window.showDirectoryPicker();
            inventory = [];
            const junk = ['.ds_store', 'thumbs.db', '.localized', 'desktop.ini'];

            for await (const entry of dirHandle.values()) {
                if (entry.kind === 'file') {
                    if (junk.includes(entry.name.toLowerCase()) || entry.name.startsWith('._')) continue;
                    const file = await entry.getFile();
                    inventory.push({
                        name: entry.name,
                        ext: entry.name.includes('.') ? entry.name.split('.').pop().toLowerCase() : 'none',
                        size: file.size,
                        base: entry.name.split('.').slice(0, -1).join('.')
                    });
                }
            }
            render();
        } catch (err) { console.warn("Access denied"); }
    }

    function render() {
        const display = document.getElementById('file-display');
        const statsDiv = document.getElementById('stats');
        display.innerHTML = '';
        
        if (inventory.length === 0) return;

        // Calculate Stats
        const totalSize = inventory.reduce((acc, f) => acc + f.size, 0);
        const logCount = inventory.filter(f => f.ext === 'md').length;
        const audioCount = inventory.filter(f => ['wav', 'aif', 'flac', 'mp3'].includes(f.ext)).length;

        statsDiv.innerHTML = `
            <div class="stat-card"><div class="stat-label">Total Files</div><div class="stat-value">${inventory.length}</div></div>
            <div class="stat-card"><div class="stat-label">Audio Clips</div><div class="stat-value">${audioCount}</div></div>
            <div class="stat-card"><div class="stat-label">Logs (.md)</div><div class="stat-value">${logCount}</div></div>
            <div class="stat-card"><div class="stat-label">Data Volume</div><div class="stat-value">${(totalSize/1024/1024/1024).toFixed(2)} GB</div></div>
        `;

        const groups = {};
        inventory.forEach(f => {
            if (!groups[f.ext]) groups[f.ext] = [];
            groups[f.ext].push(f);
        });

        Object.keys(groups).sort().forEach(ext => {
            const groupWrap = document.createElement('div');
            groupWrap.className = 'file-group';
            const groupSize = groups[ext].reduce((acc, f) => acc + f.size, 0);
            
            groupWrap.innerHTML = `
                <div class="group-header">
                    <span>.${ext.toUpperCase()}</span>
                    <span>${groups[ext].length} FILES — ${(groupSize/1024/1024).toFixed(1)} MB</span>
                </div>
            `;
            
            const list = document.createElement('ul');
            list.className = 'file-list';
            
            groups[ext].sort((a,b) => a.name.localeCompare(b.name)).forEach(f => {
                const isAudio = ['wav', 'mp3', 'aif'].includes(f.ext);
                const hasLog = inventory.some(x => x.ext === 'md' && x.base === f.base);
                const li = document.createElement('li');
                li.className = `file-item ${isAudio && !hasLog ? 'missing-log' : ''}`;
                li.innerText = f.name;
                list.appendChild(li);
            });
            
            groupWrap.appendChild(list);
            display.appendChild(groupWrap);
        });
    }

    function prepareExport(type) {
        if (inventory.length === 0) return;
        currentExportType = type;
        let out = type === 'md' ? `# ARCHIVE REPORT // ${new Date().toLocaleDateString()}\n\n` : `ARCHIVE REPORT // ${new Date().toLocaleDateString()}\n\n`;
        
        const groups = {};
        inventory.forEach(f => { if (!groups[f.ext]) groups[f.ext] = []; groups[f.ext].push(f); });

        Object.keys(groups).sort().forEach(ext => {
            out += type === 'md' ? `### .${ext.toUpperCase()}\n` : `--- ${ext.toUpperCase()} ---\n`;
            groups[ext].forEach(f => out += type === 'md' ? `- ${f.name}\n` : `${f.name}\n`);
            out += "\n";
        });

        document.getElementById('output-area').value = out;
        document.getElementById('export-title').innerText = `PREVIEW: ${type.toUpperCase()}`;
        document.getElementById('output-overlay').style.display = 'flex';
    }

    function copyOutput() {
        document.getElementById('output-area').select();
        document.execCommand('copy');
    }

    function downloadList() {
        const content = document.getElementById('output-area').value;
        const blob = new Blob([content], { type: 'text/plain' });
        const a = document.createElement('a');
        const stamp = new Date().toISOString().slice(0,10).replace(/-/g, '');
        a.href = URL.createObjectURL(blob);
        a.download = `Inventory_${stamp}.${currentExportType}`;
        a.click();
    }
</script>
</body>
</html>
