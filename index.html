<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="UTF-8">
    <title>Soundjournal | Deep Zen</title>
    <style>
        :root[data-theme="light"] { --bg: #fdf6e3; --text: #586e75; --ui: #eee8d5; --accent: #268bd2; --stats: #657b83; --pulse-bg: #e8dfc4; --pulse-text: #268bd2; }
        :root[data-theme="sepia"] { --bg: #f4ecd8; --text: #5b4636; --ui: #eadaaf; --accent: #8c6c4f; --stats: #5b4636; --pulse-bg: #dcc8a0; --pulse-text: #8c6c4f; }
        /* Darker Dark Mode: Pulses to pure black while text brightens */
        :root[data-theme="dark"] { --bg: #121212; --text: #a0a0a0; --ui: #1a1a1a; --accent: #0088cc; --stats: #999; --pulse-bg: #000000; --pulse-text: #ffffff; }

        body, html { 
            margin: 0; padding: 0; background-color: var(--bg); color: var(--text); 
            height: 100%; width: 100%; transition: all 1.5s ease;
            font-family: 'Georgia', serif; overflow: hidden;
        }

        /* 8-Second Environmental Pulse */
        @keyframes zenPulse {
            0% { background-color: var(--bg); color: var(--text); }
            50% { background-color: var(--pulse-bg); color: var(--pulse-text); }
            100% { background-color: var(--bg); color: var(--text); }
        }

        .timer-finished { animation: zenPulse 4s ease-in-out 2; }
        .timer-finished #timer-display { color: var(--pulse-text); font-weight: bold; }

        #header-shield { position: fixed; top: 0; left: 0; right: 0; height: 100px; background-color: inherit; z-index: 100; }
        #scroll-container { height: 100vh; width: 100%; overflow-y: auto; display: flex; flex-direction: column; align-items: center; }
        #writing-area { width: 90%; max-width: 650px; padding: 120px 20px 40vh 20px; outline: none; line-height: 1.8; min-height: 100%; box-sizing: border-box; z-index: 10; }
        #timer-display { position: fixed; top: 25px; left: 25px; font-family: monospace; font-size: 14px; color: var(--accent); z-index: 101; }
        #nav-tools { position: fixed; top: 20px; right: 20px; display: flex; gap: 10px; align-items: center; z-index: 101; }
        .zen-circle { width: 32px; height: 32px; border-radius: 50%; border: 1px solid var(--text); background: transparent; cursor: pointer; opacity: 0.5; transition: 0.3s; display: flex; align-items: center; justify-content: center; font-size: 11px; color: var(--text); }
        .zen-circle:hover { opacity: 1; background: var(--ui); }
        #toast { position: fixed; top: 70px; right: 20px; background: var(--accent); color: white; padding: 8px 15px; border-radius: 5px; font-family: sans-serif; font-size: 12px; display: none; z-index: 1000; }
        #footer { position: fixed; bottom: 0; left: 0; right: 0; padding: 25px; background: linear-gradient(transparent, var(--bg) 50%, var(--bg)); text-align: center; font-family: monospace; font-size: 14px; color: var(--stats); pointer-events: none; z-index: 100; }
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-thumb { background: var(--ui); border-radius: 10px; }
    </style>
</head>
<body id="body-main">

    <div id="header-shield"></div>
    <div id="timer-display"></div>
    <div id="toast">Copied to Clipboard</div>

    <div id="nav-tools">
        <button class="zen-circle" id="copy-btn" title="Copy All">⎗</button>
        <button class="zen-circle" id="dl-btn" title="Download">↓</button>
        <button class="zen-circle" id="time-btn" title="Time">🕒</button>
        <button class="zen-circle" id="font-btn" title="Font">F</button>
        <button class="zen-circle" id="size-btn" title="Size">S</button>
        <button class="zen-circle" id="timer-btn" title="Timer">T</button>
        <button class="zen-circle" id="theme-btn" title="Theme">●</button>
        <button class="zen-circle" id="full-btn" title="Zen">⛶</button>
    </div>

    <div id="scroll-container">
        <div id="writing-area" contenteditable="true" spellcheck="false" autofocus></div>
    </div>

    <div id="footer"><span id="stats">0 WORDS | 0 CHARACTERS</span></div>

    <script>
        const editor = document.getElementById('writing-area');
        const stats = document.getElementById('stats');
        const timerDisplay = document.getElementById('timer-display');
        const body = document.getElementById('body-main');
        const toast = document.getElementById('toast');
        
        let fonts = ["'Georgia', serif", "sans-serif", "monospace"], fontIdx = 0;
        let sizes = [17, 19, 21, 24], sizeIdx = 1; 
        let themes = ["light", "sepia", "dark"], themeIdx = 0;
        let timerInterval;

        editor.innerText = localStorage.getItem('soundjournal_v17') || "";
        editor.style.fontSize = sizes[sizeIdx] + 'px';
        updateStats();

        editor.addEventListener('input', () => {
            localStorage.setItem('soundjournal_v17', editor.innerText);
            updateStats();
        });

        function updateStats() {
            const text = editor.innerText.trim();
            const words = text ? text.split(/\s+/).length : 0;
            const chars = editor.innerText.length;
            stats.innerText = `${words} WORDS | ${chars} CHARACTERS`;
        }

        function showToast(msg) {
            toast.innerText = msg;
            toast.style.display = 'block';
            setTimeout(() => { toast.style.display = 'none'; }, 2000);
        }

        // --- DEEP GONG AUDIO ---
        function playDeepGong() {
            const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            const masterGain = audioCtx.createGain();
            masterGain.connect(audioCtx.destination);

            // Very low fundamental + heavy low overtones
            const frequencies = [55, 110, 165, 225]; 
            
            frequencies.forEach((freq, i) => {
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                
                osc.type = i === 0 ? 'sine' : 'triangle'; // Triangle adds a bit of "metallic" grit
                osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
                
                gain.gain.setValueAtTime(0, audioCtx.currentTime);
                gain.gain.linearRampToValueAtTime(i === 0 ? 0.5 : 0.2, audioCtx.currentTime + 0.1); // Slower "thud" attack
                gain.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + 12); // Extra long fade
                
                osc.connect(gain);
                gain.connect(masterGain);
                osc.start();
                osc.stop(audioCtx.currentTime + 12);
            });
        }

        document.getElementById('copy-btn').onclick = () => {
            navigator.clipboard.writeText(editor.innerText).then(() => showToast("Copied to Clipboard"));
        };

        document.getElementById('dl-btn').onclick = () => {
            const now = new Date();
            const timeStr = now.getHours().toString().padStart(2, '0') + "h" + now.getMinutes().toString().padStart(2, '0');
            const blob = new Blob([editor.innerText], { type: 'text/plain' });
            const a = document.createElement('a');
            a.href = URL.createObjectURL(blob);
            a.download = `Soundjournal-${now.toISOString().slice(0,10)}-${timeStr}.txt`;
            a.click();
            showToast("Saved");
        };

        document.getElementById('timer-btn').onclick = () => {
            const mins = prompt("Target minutes:", "20");
            if (mins) {
                body.classList.remove('timer-finished');
                clearInterval(timerInterval);
                let secs = mins * 60;
                timerInterval = setInterval(() => {
                    if (secs <= 0) {
                        clearInterval(timerInterval);
                        timerDisplay.innerText = "TIMER ENDED";
                        body.classList.add('timer-finished'); 
                        playDeepGong();
                        setTimeout(() => body.classList.remove('timer-finished'), 8500);
                    } else {
                        timerDisplay.innerText = `${Math.floor(secs/60)}:${(secs%60).toString().padStart(2,'0')}`;
                        secs--;
                    }
                }, 1000);
            }
        };

        document.getElementById('time-btn').onclick = () => {
            const now = new Date();
            const stamp = `\n[${now.toLocaleDateString()} ${now.toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'})}]\n`;
            document.execCommand('insertText', false, stamp);
            updateStats();
        };

        document.getElementById('font-btn').onclick = () => { fontIdx = (fontIdx + 1) % fonts.length; editor.style.fontFamily = fonts[fontIdx]; };
        document.getElementById('size-btn').onclick = () => { sizeIdx = (sizeIdx + 1) % sizes.length; editor.style.fontSize = sizes[sizeIdx] + 'px'; };
        document.getElementById('theme-btn').onclick = () => { themeIdx = (themeIdx + 1) % themes.length; document.documentElement.setAttribute('data-theme', themes[themeIdx]); };
        document.getElementById('full-btn').onclick = () => { if (!document.fullscreenElement) document.documentElement.requestFullscreen(); else document.exitFullscreen(); };
    </script>
</body>
</html>
