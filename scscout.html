<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Soundjournal | Folder Scout V3.6</title>
    <style>
        :root { 
            --bg: #000; --panel: #0d0d0d; --text-dim: #666; --text-mid: #999; --text-bright: #eceae4; 
            --accent: #00ffcc; --border: #222; --warn: #ff4444; 
            --grid-layout: 40px minmax(200px, 1.5fr) 1fr 70px 130px 130px 70px 40px 75px;
        }
        
        body.light-mode {
            --bg: #f5f5f3; --panel: #ffffff; --text-dim: #888; --text-mid: #444; --text-bright: #111;
            --accent: #008f7a; --border: #ddd;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background: var(--bg); color: var(--text-bright); font-family: -apple-system, system-ui, sans-serif; transition: background 0.2s; min-height: 100vh; padding-bottom: 200px; }
        
        .app-container { width: 100%; max-width: 1400px; padding: 40px 60px; margin: 0 auto; }
        header { border-bottom: 1px solid var(--border); padding-bottom: 20px; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; }
        h1 { font-size: 10px; letter-spacing: 3px; color: var(--text-dim); text-transform: uppercase; }

        .status-strip { display: flex; gap: 20px; font-family: monospace; font-size: 10px; color: var(--text-dim); text-transform: uppercase; margin-bottom: 20px; padding: 0 5px; }
        .status-strip b { color: var(--accent); }

        .toolbar { display: flex; gap: 10px; align-items: center; background: var(--panel); padding: 12px; border-radius: 4px; border: 1px solid var(--border); margin-bottom: 20px; position: sticky; top: 10px; z-index: 10; }
        #search-input { background: var(--bg); border: 1px solid var(--border); color: var(--text-bright); padding: 10px 15px; border-radius: 3px; flex: 1; font-family: monospace; outline: none; }

        .btn { background: var(--panel); border: 1px solid var(--border); color: var(--text-mid); cursor: pointer; font-family: monospace; font-size: 11px; font-weight: bold; padding: 8px 14px; border-radius: 3px; text-transform: uppercase; transition: all 0.1s; white-space: nowrap; }
        .btn:hover { border-color: var(--text-mid); color: var(--text-bright); background: rgba(128,128,128,0.1); }
        .btn-primary { background: var(--text-bright); color: var(--bg); border: none; }
        .btn-mini { padding: 4px; font-size: 10px; min-width: 32px; height: 28px; display: inline-flex; align-items: center; justify-content: center; }
        .btn-magic { color: #bb86fc; border-color: rgba(187,134,252,0.3); }
        .btn-magic.loading { opacity: 0.3; cursor: wait; }

        .file-group { margin-bottom: 30px; border: 1px solid var(--border); border-radius: 4px; background: var(--panel); overflow: hidden; }
        .grid-row { display: grid; grid-template-columns: var(--grid-layout); gap: 15px; align-items: center; padding: 8px 20px; font-family: monospace; }
        .header-row { background: rgba(128,128,128,0.05); font-size: 10px; color: var(--text-dim); text-transform: uppercase; border-bottom: 1px solid var(--border); font-weight: bold; }
        .file-item { font-size: 12px; border-bottom: 1px solid var(--border); color: var(--text-mid); }
        .file-item:hover { background: rgba(128,128,128,0.05); color: var(--text-bright); }
        
        .tag-input { background: var(--bg); border: 1px solid var(--border); color: var(--accent); font-size: 11px; padding: 6px; width: 100%; border-radius: 2px; outline: none; }

        /* PLAYER DOCK */
        #player-dock { 
            position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%);
            width: 800px; background: var(--panel); border: 1px solid var(--border); 
            border-top: 2px solid var(--accent); padding: 20px; display: none; 
            flex-direction: column; gap: 12px; z-index: 1000; border-radius: 8px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.8);
        }
        .waveform-container { position: relative; width: 100%; height: 50px; background: #000; cursor: crosshair; border-radius: 4px; border: 1px solid #222; overflow: hidden; }
        #wave-canvas { width: 100%; height: 100%; }
        #playhead { position: absolute; top: 0; left: 0; width: 2px; height: 100%; background: var(--accent); pointer-events: none; }
        
        /* MODAL */
        #modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.95); display: none; padding: 40px; z-index: 2000; }
        #modal-content { background: var(--panel); padding: 30px; height: 100%; border: 1px solid var(--border); border-radius: 8px; display: flex; flex-direction: column; gap: 15px; }
        textarea { flex: 1; background: #000; color: #ccc; padding: 20px; font-family: monospace; border: 1px solid var(--border); outline: none; resize: none; }
    </style>
</head>
<body>

<div class="app-container">
    <header>
        <h1>SC_SCOUT // V3.6 FINAL</h1>
        <div style="display:flex; gap:8px;">
            <button class="btn" onclick="toggleTheme()">🌓 PHASE</button>
            <button class="btn btn-primary" onclick="selectFolder()">SCAN FOLDER</button>
            <button class="btn" onclick="openRenameModal()">RENAME</button>
            <button class="btn" onclick="prepareExport()">MD</button>
        </div>
    </header>

    <div id="status-bar" class="status-strip"></div>

    <div class="toolbar">
        <input type="text" id="search-input" placeholder="Search..." oninput="render()">
        <select id="sort-type" onchange="render()" class="btn">
            <option value="name-asc">NAME A-Z</option>
            <option value="date-new">DATE (NEWEST)</option>
            <option value="size-desc">SIZE (LARGEST)</option>
        </select>
    </div>

    <div id="file-display"></div>
</div>

<div id="player-dock">
    <div style="display:flex; justify-content: space-between; align-items: center;">
        <span id="playing-now" style="font-family: monospace; font-size: 9px; color: var(--accent); letter-spacing: 1px;"></span>
        <span id="time-display" style="font-family: monospace; font-size: 11px; color: var(--text-mid);">00:00 / 00:00</span>
    </div>
    <div class="waveform-container" onclick="seekAudio(event)">
        <canvas id="wave-canvas"></canvas>
        <div id="playhead"></div>
    </div>
    <div style="display:flex; justify-content: space-between;">
        <div style="display:flex; gap:8px;">
            <button class="btn" onclick="togglePlay()" id="play-pause-btn">▶</button>
            <button class="btn" onclick="stopAudio()">■</button>
        </div>
        <button class="btn" onclick="closePlayer()">✕ CLOSE</button>
    </div>
    <audio id="global-player" style="display:none;"></audio>
</div>

<div id="modal-overlay" onclick="closeModal()">
    <div id="modal-content" onclick="event.stopPropagation()">
        <div style="display:flex; justify-content: space-between; align-items: center;">
            <h2 id="modal-title" style="font-size: 11px; color: var(--accent);"></h2>
            <button class="btn" onclick="closeModal()">CLOSE</button>
        </div>
        <textarea id="modal-text"></textarea>
    </div>
</div>

<script>
    let inventory = [];
    let dirHandle = null;
    let fileTags = JSON.parse(localStorage.getItem('scout_tags') || '{}');
    let audioCtx = new (window.AudioContext || window.webkitAudioContext)();

    function pad(n) { return n.toString().padStart(2, '0'); }
    function formatTime(s) { if (isNaN(s)) return "--:--"; const m = Math.floor(s / 60), sec = Math.floor(s % 60); return `${pad(m)}:${pad(sec)}`; }
    function formatLocal(d) { return d ? `${d.getFullYear()}${pad(d.getMonth()+1)}${pad(d.getDate())}_${pad(d.getHours())}${pad(d.getMinutes())}` : "00000000_0000"; }
    function formatDisplayDate(d) { return d ? `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())} ${pad(d.getHours())}:${pad(d.getMinutes())}` : "--:--"; }

    async function selectFolder() { try { dirHandle = await window.showDirectoryPicker(); await refreshInventory(); } catch (e) {} }

    async function refreshInventory() {
        inventory = [];
        for await (const entry of dirHandle.values()) {
            if (entry.kind === 'file' && !entry.name.startsWith('.')) {
                const file = await entry.getFile();
                inventory.push({
                    handle: entry, name: entry.name,
                    ext: entry.name.split('.').pop().toLowerCase(),
                    size: (file.size / (1024 * 1024)).toFixed(1) + " MB",
                    date: file.lastModified,
                    recEnd: formatDisplayDate(new Date(file.lastModified)),
                    recStart: "--:--", tag: fileTags[entry.name] || "",
                    duration: "--:--", rawDuration: 0, analyzing: true
                });
            }
        }
        render();
        loadMetadata();
    }

    async function loadMetadata() {
        for (let item of inventory) {
            if (['wav', 'mp3', 'm4a', 'ogg'].includes(item.ext)) {
                try {
                    const file = await item.handle.getFile();
                    const url = URL.createObjectURL(file);
                    const audio = new Audio(url);
                    audio.onloadedmetadata = () => {
                        item.rawDuration = audio.duration;
                        item.duration = formatTime(audio.duration);
                        item.recStart = formatDisplayDate(new Date(item.date - (audio.duration * 1000)));
                        item.analyzing = false;
                        URL.revokeObjectURL(url);
                        render();
                    };
                } catch(e) { item.analyzing = false; }
            } else { item.analyzing = false; }
        }
    }

    function render() {
        const display = document.getElementById('file-display');
        display.innerHTML = '';
        
        const sorted = [...inventory].sort((a,b) => {
            const type = document.getElementById('sort-type').value;
            if(type === 'name-asc') return a.name.localeCompare(b.name);
            if(type === 'date-new') return b.date - a.date;
            return parseFloat(b.size) - parseFloat(a.size);
        });

        const query = document.getElementById('search-input').value.toLowerCase();
        const filtered = sorted.filter(f => f.name.toLowerCase().includes(query) || f.tag.toLowerCase().includes(query));
        
        document.getElementById('status-bar').innerHTML = `<span>Matches: <b>${filtered.length}</b></span><span>Dir: <b>${dirHandle?.name || 'None'}</b></span>`;

        const groups = {};
        filtered.forEach(f => { if (!groups[f.ext]) groups[f.ext] = []; groups[f.ext].push(f); });

        Object.keys(groups).sort().forEach(ext => {
            const wrap = document.createElement('div');
            wrap.className = 'file-group';
            wrap.innerHTML = `<div class="header-row grid-row"><span>.${ext}</span><span>FILENAME</span><span>TAGS</span><span style="text-align:right">DUR</span><span style="text-align:center">REC START</span><span style="text-align:center">REC END</span><span style="text-align:right">SIZE</span><span></span><span></span></div>`;
            const list = document.createElement('div');
            groups[ext].forEach(f => {
                const row = document.createElement('div');
                row.className = 'file-item grid-row';
                row.innerHTML = `
                    <button class="btn btn-mini" onclick="playFile('${f.name}')">▶</button>
                    <span class="file-name" title="${f.name}">${f.name}</span>
                    <input type="text" class="tag-input" value="${f.tag}" onchange="updateTag('${f.name}', this.value)">
                    <span style="text-align:right">${f.duration}</span>
                    <span style="text-align:center; color:var(--accent)">${f.recStart}</span>
                    <span style="text-align:center">${f.recEnd}</span>
                    <span style="text-align:right">${f.size}</span>
                    <button class="btn btn-mini btn-magic ${f.analyzing ? 'loading' : ''}" onclick="magicRename('${f.name}')">🪄</button>
                    <button class="btn btn-mini btn-danger" onclick="softDelete('${f.name}')">🗑</button>
                `;
                list.appendChild(row);
            });
            wrap.appendChild(list);
            display.appendChild(wrap);
        });
    }

    async function magicRename(oldName) {
        const item = inventory.find(f => f.name === oldName);
        if (!item || item.analyzing || item.rawDuration === 0) return;
        
        const d = new Date(item.date - (item.rawDuration * 1000));
        const dateStamp = formatLocal(d);
        const durStamp = pad(Math.floor(item.rawDuration/60)) + pad(Math.floor(item.rawDuration%60));
        const folderName = dirHandle.name.toUpperCase();
        const cleanTag = item.tag ? `_${item.tag.trim().replace(/\s+/g, '_')}` : "";
        
        const newName = `${dateStamp}_${durStamp}_${folderName}${cleanTag}.${item.ext}`;
        
        if (confirm(`Magic Rename to:\n${newName}`)) {
            try {
                await item.handle.move(newName);
                await refreshInventory();
            } catch (e) { alert("Rename failed. File may be in use."); }
        }
    }

    /* SHARED LOGIC */
    async function playFile(name) {
        const item = inventory.find(f => f.name === name);
        const file = await item.handle.getFile();
        const player = document.getElementById('global-player');
        player.src = URL.createObjectURL(file);
        document.getElementById('player-dock').style.display = 'flex';
        document.getElementById('playing-now').innerText = name.toUpperCase();
        player.play();
        document.getElementById('play-pause-btn').innerText = "||";
        const buf = await audioCtx.decodeAudioData(await file.arrayBuffer());
        drawWave(buf);
        player.ontimeupdate = () => {
            document.getElementById('playhead').style.left = (player.currentTime / player.duration) * 100 + '%';
            document.getElementById('time-display').innerText = `${formatTime(player.currentTime)} / ${formatTime(player.duration)}`;
        };
    }

    function drawWave(buffer) {
        const canvas = document.getElementById('wave-canvas');
        const ctx = canvas.getContext('2d');
        canvas.width = canvas.offsetWidth; canvas.height = canvas.offsetHeight;
        const data = buffer.getChannelData(0);
        const step = Math.ceil(data.length / canvas.width);
        const amp = canvas.height / 2;
        ctx.clearRect(0,0,canvas.width,canvas.height);
        ctx.fillStyle = getComputedStyle(document.body).getPropertyValue('--accent');
        for(let i=0; i<canvas.width; i++){
            let min=1, max=-1;
            for(let j=0; j<step; j++){ const d=data[(i*step)+j]; if(d<min) min=d; if(d>max) max=d; }
            ctx.fillRect(i, (1+min)*amp, 1, Math.max(1,(max-min)*amp));
        }
    }

    function togglePlay() { const p = document.getElementById('global-player'); if(p.paused){ p.play(); document.getElementById('play-pause-btn').innerText="||"; } else { p.pause(); document.getElementById('play-pause-btn').innerText="▶"; }}
    function stopAudio() { const p = document.getElementById('global-player'); p.pause(); p.currentTime=0; document.getElementById('play-pause-btn').innerText="▶"; }
    function seekAudio(e) { const r = e.currentTarget.getBoundingClientRect(); document.getElementById('global-player').currentTime = ((e.clientX-r.left)/r.width) * document.getElementById('global-player').duration; }
    function closePlayer() { document.getElementById('global-player').pause(); document.getElementById('player-dock').style.display='none'; }
    function updateTag(n,v) { fileTags[n]=v; localStorage.setItem('scout_tags', JSON.stringify(fileTags)); inventory.find(f=>f.name===n).tag=v; }
    function openRenameModal() { document.getElementById('modal-title').innerText = "Bulk List"; document.getElementById('modal-text').value = inventory.map(f=>f.name).join('\n'); document.getElementById('modal-overlay').style.display='block'; }
    function closeModal() { document.getElementById('modal-overlay').style.display='none'; }
    function toggleTheme() { document.body.classList.toggle('light-mode'); }
    async function softDelete(n) { if(confirm("Trash?")){ await inventory.find(f => f.name === n).handle.move(await dirHandle.getDirectoryHandle('.trash', {create:true})); await refreshInventory(); }}
</script>
</body>
</html>
